name: Build Windows Application

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Install all dependencies, skip postinstall (local electron-rebuild reference)
      - name: Install Dependencies
        run: npm ci --ignore-scripts

      # Rebuild better-sqlite3 native addon for the exact Electron version on Windows
      - name: Rebuild Native Modules
        run: npx @electron/rebuild -f -w better-sqlite3

      # Build Vite frontend
      - name: Build Frontend (Vite)
        run: npx vite build

      # Compile Electron TypeScript
      - name: Compile Electron TypeScript
        run: npx tsc -p electron

      # Build AND publish with electron-builder.
      # --publish always uploads .exe, latest.yml, and .blockmap to the GitHub Release.
      # electron-updater requires latest.yml to detect and download new versions.
      - name: Build & Publish to GitHub Release
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Also upload installer as a workflow artifact (downloadable from the Actions tab)
      - name: Upload Windows Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LE-Mail-Campaign-Windows-${{ github.ref_name }}
          path: |
            release/**/*.exe
          if-no-files-found: warn
