name: Build Windows Application

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Install all dependencies, skip postinstall (it references local electron-rebuild)
      - name: Install Dependencies
        run: npm ci --ignore-scripts

      # Rebuild better-sqlite3 native addon for the exact Electron version on Windows
      - name: Rebuild Native Modules
        run: npx @electron/rebuild -f -w better-sqlite3

      # Build Vite frontend
      - name: Build Frontend (Vite)
        run: npx vite build

      # Compile Electron TypeScript
      - name: Compile Electron TypeScript
        run: npx tsc -p electron

      # Package with electron-builder for Windows (publish=never avoids auth issues on branch builds)
      - name: Package with electron-builder
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload the installer as a downloadable artifact
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: LE-Mail-Campaign-Windows-${{ github.ref_name }}
          path: |
            release/**/*.exe
            release/**/*.msi
          if-no-files-found: warn

      # Only publish a GitHub Release when triggered by a version tag (v*)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
