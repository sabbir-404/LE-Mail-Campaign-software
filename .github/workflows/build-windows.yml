name: Build Windows Application

on:
  push:
    tags:
      - 'v*'       # Trigger on version tags, e.g. v1.0.2
  workflow_dispatch: # Also allow manual trigger from GitHub UI

permissions:
  contents: write   # Required to create GitHub Releases and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Install Python and Windows Build Tools for native module compilation
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Windows Build Tools
        run: npm install --global --production windows-build-tools --vs2022 2>NUL; exit 0
        shell: cmd
        continue-on-error: true

      # Install dependencies WITHOUT running postinstall (we rebuild manually below)
      - name: Install Dependencies
        run: npm ci --ignore-scripts
        env:
          npm_config_ignore_scripts: true

      # Rebuild better-sqlite3 specifically for Electron's Node.js version on Windows
      - name: Rebuild Native Modules for Electron
        run: npx @electron/rebuild -f -w better-sqlite3
        env:
          npm_config_msvs_version: 2022

      # Build Vite frontend + compile Electron TypeScript + package with electron-builder
      - name: Build Application
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload the installer as a build artifact (always accessible from Actions tab)
      - name: Upload Windows Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LE-Mail-Campaign-Windows-${{ github.ref_name }}
          path: release/**/*.exe
          if-no-files-found: warn

      # If triggered by a version tag, also publish as a GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
